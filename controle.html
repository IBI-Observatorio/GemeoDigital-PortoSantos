<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Controle — Gêmeo Digital Porto Santos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a; color: #e2e8f0;
      font-family: -apple-system, system-ui, sans-serif;
      padding: 14px 12px 40px;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    header .title { font-weight: 700; color: #38bdf8; font-size: 15px; }
    header .sub { font-size: 11px; color: #64748b; }

    .channel-row { display: flex; gap: 8px; margin-bottom: 5px; }
    .channel-row input {
      flex: 1; background: #1e293b; border: 1px solid #334155;
      border-radius: 7px; color: #e2e8f0; padding: 10px 12px;
      font-size: 14px; outline: none;
    }
    .channel-row input:focus { border-color: #38bdf8; }
    .btn-connect {
      padding: 10px 18px; background: #0ea5e9; border: none;
      border-radius: 7px; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-connect:active { background: #0284c7; }

    #status { font-size: 11px; color: #64748b; margin-bottom: 16px; min-height: 16px; }
    #status.ok  { color: #22c55e; }
    #status.err { color: #f87171; }

    h2 {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: .08em; color: #64748b;
      margin: 18px 0 9px;
    }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

    .cmd-btn {
      padding: 16px 6px; background: #1e293b;
      border: 1px solid #334155; border-radius: 10px;
      color: #e2e8f0; font-size: 14px; font-weight: 500;
      cursor: pointer; text-align: center;
      transition: background .1s, border-color .1s;
      line-height: 1.2;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .cmd-btn:active {
      background: rgba(56,189,248,.18);
      border-color: #38bdf8; color: #38bdf8;
    }
    .cmd-btn.layer { padding: 14px 8px; font-size: 13px; }
    .cmd-btn.full  { grid-column: 1 / -1; }

    /* Botões de painel — cor de destaque por seção */
    .cmd-btn.navios {
      background: rgba(245,158,11,0.08);
      border-color: rgba(245,158,11,0.25);
      color: #fbbf24;
    }
    .cmd-btn.navios:active {
      background: rgba(245,158,11,0.22);
      border-color: #f59e0b;
    }
    .cmd-btn.emprego {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.22);
      color: #86efac;
    }
    .cmd-btn.emprego:active {
      background: rgba(34,197,94,0.22);
      border-color: #22c55e;
    }
    .cmd-btn.fechar {
      background: rgba(100,116,139,0.08);
      border-color: rgba(100,116,139,0.2);
      color: #64748b;
      font-size: 12px;
      padding: 10px 6px;
    }
    .cmd-btn.fechar:active {
      background: rgba(100,116,139,0.2);
      border-color: #94a3b8;
      color: #cbd5e1;
    }

    /* Separador de seção */
    .section-divider {
      height: 1px;
      background: #1e293b;
      margin: 6px 0 0;
    }

    .custom-row { display: flex; gap: 8px; margin-top: 6px; }
    .custom-row input {
      flex: 1; background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0;
      padding: 13px 12px; font-size: 14px; outline: none;
    }
    .custom-row input:focus { border-color: #38bdf8; }
    .btn-send {
      padding: 13px 18px; background: #1e3a5f;
      border: 1px solid #38bdf8; border-radius: 8px;
      color: #38bdf8; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .btn-send:active { background: rgba(56,189,248,.2); }

    #feedback { font-size: 12px; color: #38bdf8; margin-top: 8px; min-height: 18px; }

    /* Voz */
    #voice-section { margin: 18px 0; text-align: center; }
    #micBtn {
      width: 80px; height: 80px; border-radius: 50%;
      background: #1e293b; border: 2px solid #334155;
      color: #94a3b8; cursor: pointer; display: inline-flex;
      align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, color .15s;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #micBtn.listening {
      background: #7f1d1d; border-color: #f87171; color: #f87171;
      animation: micpulse 1s ease-in-out infinite;
    }
    @keyframes micpulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 12px rgba(248,113,113,0)} }
    #micLabel { font-size: 12px; color: #64748b; margin-top: 8px; }
    #micLabel.listening { color: #f87171; }
    #voiceResult { font-size: 13px; color: #38bdf8; margin-top: 6px; min-height: 18px; font-style: italic; }

    /* Gêmeo AI */
    #ai-section { margin-top: 18px; }
    #ai-chat {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(34,197,94,0.2);
      border-radius: 12px; padding: 12px 14px; min-height: 60px;
      max-height: 300px; overflow-y: auto; margin-bottom: 10px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .ai-m { font-size: 13px; line-height: 1.5; }
    .ai-m.u { color: #94a3b8; text-align: right; }
    .ai-m.u span { background: rgba(59,130,246,0.2); padding: 6px 12px; border-radius: 12px 12px 2px 12px; display: inline-block; }
    .ai-m.t { color: #f59e0b; font-style: italic; font-size: 12px; }
    .ai-m.r { color: #e2e8f0; }
    .ai-m.r span { background: rgba(34,197,94,0.1); padding: 8px 12px; border-radius: 2px 12px 12px 12px; display: inline-block; }
    .ai-input-row { display: flex; gap: 8px; }
    .ai-input-row input {
      flex: 1; background: #1e293b; border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; outline: none;
    }
    .ai-input-row input:focus { border-color: #22c55e; }
    .ai-input-row button {
      padding: 12px 18px; background: #22c55e; border: none; border-radius: 8px;
      color: #000; font-weight: 600; font-size: 14px; cursor: pointer;
    }
    .ai-input-row button:active { background: #16a34a; }

    footer { margin-top: 32px; text-align: center; font-size: 11px; color: #334155; }
    footer a { color: #475569; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
       fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
    <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
    <line x1="6" y1="1" x2="6" y2="4"/>
    <line x1="10" y1="1" x2="10" y2="4"/>
    <line x1="14" y1="1" x2="14" y2="4"/>
  </svg>
  <div>
    <div class="title">Controle Remoto</div>
    <div class="sub">Gêmeo Digital — Porto Santos</div>
  </div>
</header>

<!-- Canal ntfy.sh -->
<div class="channel-row">
  <input id="channelInput" type="text" value="gemeo-ibi"
         placeholder="Nome do canal" autocomplete="off"
         autocorrect="off" autocapitalize="none" spellcheck="false">
  <button class="btn-connect" onclick="connect()">Conectar</button>
</div>
<div id="status">Configure o canal e toque em Conectar</div>

<!-- Voz -->
<div id="voice-section">
  <button id="micBtn" onclick="toggleVoice()" title="Falar comando">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" x2="12" y1="19" y2="22"/>
    </svg>
  </button>
  <div id="micLabel">Toque para falar</div>
  <div id="voiceResult"></div>
</div>

<!-- Navegação -->
<h2>Navegação</h2>
<div class="grid-3">
  <button class="cmd-btn" onclick="send('porto')">Porto</button>
  <button class="cmd-btn" onclick="send('tecon')">Tecon</button>
  <button class="cmd-btn" onclick="send('btp')">BTP</button>
  <button class="cmd-btn" onclick="send('alemoa')">Alemoa</button>
  <button class="cmd-btn" onclick="send('canal')">Canal</button>
  <button class="cmd-btn" onclick="send('tunel')">Túnel</button>
  <button class="cmd-btn full" onclick="send('centro')">Centro</button>
</div>

<!-- Camadas -->
<h2>Camadas</h2>
<div class="grid-2">
  <button class="cmd-btn layer" onclick="send('navios')">Navios simulados</button>
  <button class="cmd-btn layer" onclick="send('ais')">Navios AIS</button>
  <button class="cmd-btn layer" onclick="send('ruas')">Ruas</button>
  <button class="cmd-btn layer" onclick="send('mapa 3d')">Mapa 3D</button>
  <button class="cmd-btn layer" onclick="send('sombras')">Sombras</button>
  <button class="cmd-btn layer" onclick="send('labels')">Labels</button>
</div>

<!-- Painel de Navios -->
<h2>🚢 Navios</h2>
<div class="grid-2">
  <button class="cmd-btn navios full" onclick="send('quantos navios no porto')">Situação geral do porto</button>
  <button class="cmd-btn navios" onclick="send('navios atracados')">Atracados</button>
  <button class="cmd-btn navios" onclick="send('navios fundeados')">Fundeados</button>
  <button class="cmd-btn navios full" onclick="send('próximas chegadas')">Próximas chegadas</button>
  <button class="cmd-btn fechar full" onclick="send('fechar navios')">✕ Fechar painel de navios</button>
</div>

<!-- Painel de Emprego -->
<h2>👷 Emprego Portuário</h2>
<div class="grid-2">
  <button class="cmd-btn emprego full" onclick="send('perfil completo')">Perfil completo</button>
  <button class="cmd-btn emprego" onclick="send('quantos empregos')">Total de empregos</button>
  <button class="cmd-btn emprego" onclick="send('homens e mulheres')">Gênero</button>
  <button class="cmd-btn emprego" onclick="send('faixa etária')">Faixa etária</button>
  <button class="cmd-btn emprego" onclick="send('salário')">Salário médio</button>
  <button class="cmd-btn emprego" onclick="send('empregos criados')">Novos empregos</button>
  <button class="cmd-btn emprego" onclick="send('escolaridade')">Escolaridade</button>
  <button class="cmd-btn fechar full" onclick="send('fechar emprego')">✕ Fechar painel de emprego</button>
</div>

<!-- Gêmeo AI -->
<div id="ai-section">
  <h2>🤖 Gêmeo AI</h2>
  <div id="ai-chat">
    <div class="ai-m r"><span>Olá! Pergunte sobre navios, terminais, cargas...</span></div>
  </div>
  <div class="ai-input-row">
    <input type="text" id="aiQ" placeholder="Pergunte algo..." enterkeyhint="send" onkeydown="if(event.key==='Enter')aiAsk()">
    <button onclick="aiAsk()">🤖</button>
  </div>
  <button class="cmd-btn fechar full" style="margin-top:8px" onclick="send('ai:fechar')">✕ Fechar painel IA</button>
</div>

<!-- Comando livre -->
<h2>Comando livre</h2>
<div class="custom-row">
  <input id="customInput" type="text"
         placeholder="Ex: mostrar navios, ir para tecon..."
         enterkeyhint="send">
  <button class="btn-send" onclick="sendCustom()">Enviar</button>
</div>
<div id="feedback"></div>

<footer>
  Canal: ntfy.sh/<span id="channelDisplay">—</span><br>
  <a href="https://ibi-observatorio.github.io/GemeoDigital-PortoSantos/" target="_blank">
    Abrir mapa
  </a>
</footer>

<script>
let channelName = '';

function connect() {
  const raw = document.getElementById('channelInput').value.trim();
  channelName = (raw || 'gemeo-ibi').toLowerCase().replace(/\s+/g, '-');
  document.getElementById('channelDisplay').textContent = channelName;
  const st = document.getElementById('status');
  st.textContent = 'Canal "' + channelName + '" pronto — toque um botão para enviar';
  st.className = 'ok';
}

async function send(cmd) {
  if (!channelName) { alert('Configure o canal primeiro.'); return; }
  const fb = document.getElementById('feedback');
  try {
    const res = await fetch('https://ntfy.sh/' + channelName, {
      method: 'POST',
      body: cmd,
      headers: { 'Content-Type': 'text/plain; charset=utf-8' }
    });
    if (res.ok) {
      fb.textContent = 'Enviado: "' + cmd + '"';
      setTimeout(() => { fb.textContent = ''; }, 2000);
    } else {
      fb.textContent = 'Erro ao enviar (status ' + res.status + ')';
    }
  } catch(e) {
    fb.textContent = 'Sem conexão com a internet';
  }
}

function sendCustom() {
  const input = document.getElementById('customInput');
  const v = input.value.trim();
  if (v) { send(v); input.value = ''; }
}

document.getElementById('customInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendCustom();
});

window.addEventListener('load', function() {
  const ch = document.getElementById('channelInput').value.trim();
  if (ch) connect();
});

// ── GÊMEO AI ────────────────────────────────────────────
const SCRAPER = 'http://localhost:8080';

function aiMsg(type, text) {
  const chat = document.getElementById('ai-chat');
  const div = document.createElement('div');
  div.className = 'ai-m ' + type;
  if (type === 't') { div.textContent = text; }
  else { div.innerHTML = '<span>' + text + '</span>'; }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function aiAsk() {
  const input = document.getElementById('aiQ');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  aiMsg('u', q);
  send('ai:' + q);
  aiMsg('r', 'Pergunta enviada ao Gêmeo. Veja a resposta na tela principal.');
}

function aiAnswer(q, ships, fund) {
  const ql = q.toLowerCase();

  if (ql.includes('quantos') && ql.includes('atracad'))
    return 'Há <b>' + ships.length + ' navios atracados</b> no Porto de Santos.';

  if (ql.includes('quantos') && ql.includes('fundead'))
    return 'Há <b>' + fund.length + ' navios fundeados</b> aguardando.';

  if (ql.includes('quantos') && (ql.includes('navio') || ql.includes('total')))
    return '<b>' + ships.length + '</b> atracados + <b>' + fund.length + '</b> fundeados = <b>' + (ships.length+fund.length) + ' navios</b> no porto.';

  var terminais = ['santos brasil','tecon','btp','ecoporto','eport','tgg','teag','teg','cutrale','dow','alamoa','tev','concais'];
  for (var t of terminais) {
    if (ql.includes(t)) {
      var m = ships.filter(function(s) { return s.berth.toLowerCase().includes(t) || s.terminal.toLowerCase().includes(t); });
      if (m.length > 0) {
        return m.length + ' navio(s) no ' + t.toUpperCase() + ':' + m.map(function(s) { return '<br>• <b>' + s.vessel_name + '</b> — ' + (s.cargo||'—'); }).join('');
      }
      return 'Nenhum navio no ' + t.toUpperCase() + ' agora.';
    }
  }

  var all = ships.concat(fund.map(function(f) { return {vessel_name:f.vessel_name, berth:'FUNDEIO', cargo:f.cargo_type, terminal:'FUNDEIO'}; }));
  for (var s of all) {
    if (ql.includes(s.vessel_name.toLowerCase())) {
      var st = s.berth === 'FUNDEIO' ? 'Fundeado' : 'Atracado em ' + s.berth;
      return '<b>' + s.vessel_name + '</b><br>Status: ' + st + '<br>Carga: ' + (s.cargo||'—');
    }
  }

  var cargas = ['soja','açúcar','acucar','contêiner','conteiner','container','diesel','celulose','fertilizante','trigo','veiculo','veículo'];
  for (var c of cargas) {
    if (ql.includes(c)) {
      var ma = ships.filter(function(s) { return (s.cargo||'').toLowerCase().includes(c); });
      var mf = fund.filter(function(s) { return (s.cargo_type||'').toLowerCase().includes(c); });
      var tot = ma.length + mf.length;
      if (tot > 0) {
        var r = tot + ' navio(s) com ' + c + ':';
        ma.forEach(function(s) { r += '<br>• <b>' + s.vessel_name + '</b> — atracado em ' + s.berth; });
        mf.forEach(function(s) { r += '<br>• <b>' + s.vessel_name + '</b> — fundeado'; });
        return r;
      }
      return 'Nenhum navio com ' + c + ' agora.';
    }
  }

  if (ql.includes('lista') || ql.includes('quais')) {
    if (ql.includes('fundead')) {
      return fund.length + ' fundeados (10 primeiros):' + fund.slice(0,10).map(function(s) { return '<br>• <b>' + s.vessel_name + '</b> — ' + (s.cargo_type||'—'); }).join('');
    }
    return ships.length + ' atracados (10 primeiros):' + ships.slice(0,10).map(function(s) { return '<br>• <b>' + s.vessel_name + '</b> — ' + s.berth + ' — ' + (s.cargo||'—'); }).join('');
  }

  return '<b>' + ships.length + '</b> atracados, <b>' + fund.length + '</b> fundeados. Pergunte sobre terminais, navios ou cargas.';
}

// ── VOZ ──────────────────────────────────────────────────
let voiceRec = null;
let voiceOn  = false;

function setMicState(on, msg) {
  document.getElementById('micBtn').classList.toggle('listening', on);
  const lbl = document.getElementById('micLabel');
  lbl.textContent = msg;
  lbl.classList.toggle('listening', on);
}

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceRec = new SR();
  voiceRec.lang = 'pt-BR';
  voiceRec.continuous = false;
  voiceRec.interimResults = false;
  voiceRec.maxAlternatives = 1;

  voiceRec.onresult = function(e) {
    const transcript = e.results[0][0].transcript.trim();
    document.getElementById('voiceResult').textContent = '\u201c' + transcript + '\u201d';
    send(transcript);
  };

  voiceRec.onerror = function(e) {
    if (e.error === 'no-speech') {
      if (voiceOn) setTimeout(startRecognition, 300);
      return;
    }
    setMicState(false, 'Erro: ' + e.error);
    document.getElementById('voiceResult').textContent = 'Verifique permissão de microfone';
    voiceOn = false;
  };

  voiceRec.onend = function() {
    if (voiceOn) setTimeout(startRecognition, 200);
  };

  try {
    voiceRec.start();
  } catch(err) {
    setMicState(false, 'Erro ao iniciar microfone');
    voiceOn = false;
  }
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    document.getElementById('voiceResult').textContent = 'Voz não suportada — use Chrome ou Safari';
    return;
  }
  if (voiceOn) {
    voiceOn = false;
    voiceRec && voiceRec.abort();
    setMicState(false, 'Toque para falar');
    document.getElementById('voiceResult').textContent = '';
  } else {
    if (!channelName) {
      document.getElementById('voiceResult').textContent = 'Conecte ao canal primeiro';
      return;
    }
    voiceOn = true;
    setMicState(true, 'Ouvindo\u2026');
    startRecognition();
  }
}
</script>
</body>
</html>
